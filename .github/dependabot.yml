# Dependabot configuration for automatic dependency updates
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    reviewers:
      - "jiaxintang"
    labels:
      - "dependencies"
      - "automated"
    # Security updates
    versioning-strategy: increase
    # Group updates to reduce PR noise
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      supabase:
        patterns:
          - "@supabase/*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tailwind:
        patterns:
          - "tailwind*"
          - "@tailwindcss/*"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Ignore specific packages if needed
    ignore:
      # Example: ignore major version updates for stable packages
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
